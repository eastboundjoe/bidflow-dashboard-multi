<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidFlow - Amazon Placement Optimizer</title>

    <!-- External Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Color System - Financial Terminal Palette */
            --bg-deep: #0A0E1A;
            --bg-surface: #12172A;
            --bg-elevated: #1A2038;
            --bg-glass: rgba(26, 32, 56, 0.6);

            /* Accent Colors - Placement Types */
            --electric-blue: #00D9FF;
            --amethyst: #B794F6;
            --emerald: #10B981;
            --amber-warn: #F59E0B;
            --crimson-alert: #EF4444;

            /* Text */
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --text-inverse: #0A0E1A;

            /* Borders & Dividers */
            --border-subtle: rgba(148, 163, 184, 0.1);
            --border-medium: rgba(148, 163, 184, 0.2);
            --border-strong: rgba(148, 163, 184, 0.3);

            /* Gradients */
            --gradient-brand: linear-gradient(135deg, var(--electric-blue) 0%, var(--emerald) 100%);
            --gradient-glass: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(16, 185, 129, 0.05) 100%);

            /* Typography */
            --font-display: 'Outfit', -apple-system, sans-serif;
            --font-mono: 'IBM Plex Mono', 'Courier New', monospace;

            /* Spacing */
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 3rem;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.6);
            --shadow-glow-blue: 0 0 20px rgba(0, 217, 255, 0.3);
            --shadow-glow-green: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        /* Global Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-display);
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Noise Texture Overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Authentication Page */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-xl);
            position: relative;
            z-index: 2;
            background: radial-gradient(ellipse at top, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
        }

        .auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-medium);
            border-radius: 16px;
            padding: var(--space-2xl);
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-brand);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: var(--space-sm);
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: var(--space-2xl);
            font-weight: 400;
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-brand);
            color: var(--text-inverse);
            border: none;
            border-radius: 8px;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--shadow-md);
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow-blue);
        }

        .btn-auth:active {
            transform: translateY(0);
        }

        /* Main Dashboard Layout */
        .dashboard {
            position: relative;
            z-index: 2;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: var(--space-md) var(--space-xl);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-lg);
        }

        .header-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--gradient-brand);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--space-lg);
        }

        .tenant-badge {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            font-size: 0.875rem;
            font-family: var(--font-mono);
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--emerald);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn-logout {
            padding: var(--space-sm) var(--space-md);
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-medium);
            border-radius: 6px;
            font-family: var(--font-display);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-logout:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--border-strong);
        }

        /* Main Content */
        .main-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: var(--space-xl);
        }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
            flex-wrap: wrap;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            animation-delay: 0.1s;
            animation-fill-mode: backwards;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .control-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .select, .input-search {
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            font-family: var(--font-display);
            font-size: 0.875rem;
            transition: all 0.2s ease;
            min-width: 180px;
        }

        .select:hover, .input-search:hover {
            border-color: var(--border-medium);
        }

        .select:focus, .input-search:focus {
            outline: none;
            border-color: var(--electric-blue);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }

        .input-search {
            min-width: 300px;
        }

        /* Sankey Section */
        .sankey-section {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            margin-bottom: var(--space-xl);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            animation-delay: 0.2s;
            animation-fill-mode: backwards;
        }

        .sankey-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-lg);
            border-bottom: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .sankey-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .sankey-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .toggle-icon {
            color: var(--text-secondary);
            font-size: 1.25rem;
            transition: transform 0.3s ease;
        }

        .toggle-icon.expanded {
            transform: rotate(180deg);
        }

        .sankey-content {
            padding: var(--space-xl);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sankey-content.collapsed {
            max-height: 0;
            padding: 0;
            opacity: 0;
            overflow: hidden;
        }

        .sankey-svg-wrapper {
            width: 100%;
            height: 400px;
            position: relative;
        }

        .sankey-svg-wrapper svg {
            width: 100%;
            height: 100%;
        }

        /* Sankey Styles */
        .sankey-link {
            fill: none;
            stroke-opacity: 0.3;
            transition: stroke-opacity 0.3s ease;
        }

        .sankey-link:hover {
            stroke-opacity: 0.6;
        }

        .sankey-node rect {
            stroke: var(--bg-deep);
            stroke-width: 2;
        }

        .sankey-node text {
            font-family: var(--font-display);
            font-size: 0.875rem;
            font-weight: 600;
            fill: var(--text-primary);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .sankey-particle {
            fill: white;
            opacity: 0.8;
            filter: blur(1px);
        }

        /* Table Section */
        .table-section {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            animation-delay: 0.3s;
            animation-fill-mode: backwards;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-lg);
            border-bottom: 1px solid var(--border-subtle);
        }

        .table-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn-submit {
            padding: var(--space-sm) var(--space-lg);
            background: var(--gradient-brand);
            color: var(--text-inverse);
            border: none;
            border-radius: 6px;
            font-family: var(--font-display);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--shadow-sm);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow-blue);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .data-table thead {
            background: var(--bg-elevated);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table th {
            padding: var(--space-md);
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .data-table th:hover {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
        }

        .data-table th.sortable::after {
            content: '⇅';
            margin-left: var(--space-xs);
            opacity: 0.3;
        }

        .data-table th.sorted-asc::after {
            content: '↑';
            opacity: 1;
            color: var(--electric-blue);
        }

        .data-table th.sorted-desc::after {
            content: '↓';
            opacity: 1;
            color: var(--electric-blue);
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--border-subtle);
            transition: background 0.2s ease;
        }

        .data-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .data-table tbody tr.campaign-group-start {
            border-top: 2px solid var(--border-medium);
        }

        .data-table td {
            padding: var(--space-md);
            color: var(--text-primary);
        }

        .data-table td.campaign-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .data-table td.numeric {
            font-family: var(--font-mono);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* Placement Badges */
        .placement-badge {
            display: inline-flex;
            align-items: center;
            padding: var(--space-xs) var(--space-sm);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .placement-badge.top {
            background: rgba(0, 217, 255, 0.15);
            color: var(--electric-blue);
            border: 1px solid rgba(0, 217, 255, 0.3);
        }

        .placement-badge.ros {
            background: rgba(183, 148, 246, 0.15);
            color: var(--amethyst);
            border: 1px solid rgba(183, 148, 246, 0.3);
        }

        .placement-badge.pp {
            background: rgba(16, 185, 129, 0.15);
            color: var(--emerald);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* Editable Cell */
        .editable-cell {
            position: relative;
        }

        .editable-input {
            width: 80px;
            padding: var(--space-xs) var(--space-sm);
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-medium);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            text-align: right;
            transition: all 0.2s ease;
        }

        .editable-input:focus {
            outline: none;
            border-color: var(--electric-blue);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }

        .editable-input.changed {
            border-color: var(--amber-warn);
            background: rgba(245, 158, 11, 0.1);
        }

        /* Metric Coloring */
        .metric-positive {
            color: var(--emerald);
        }

        .metric-negative {
            color: var(--crimson-alert);
        }

        .metric-warning {
            color: var(--amber-warn);
        }

        /* Loading States */
        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            flex-direction: column;
            gap: var(--space-lg);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--electric-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-surface) 50%, var(--bg-elevated) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-table {
            width: 100%;
        }

        .skeleton-row {
            display: flex;
            gap: var(--space-md);
            padding: var(--space-md);
            border-bottom: 1px solid var(--border-subtle);
        }

        .skeleton-cell {
            height: 20px;
            flex: 1;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: var(--space-xl);
            right: var(--space-xl);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .toast {
            min-width: 300px;
            padding: var(--space-md) var(--space-lg);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-medium);
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.success {
            border-color: var(--emerald);
        }

        .toast.error {
            border-color: var(--crimson-alert);
        }

        .toast-icon {
            font-size: 1.25rem;
        }

        .toast.success .toast-icon {
            color: var(--emerald);
        }

        .toast.error .toast-icon {
            color: var(--crimson-alert);
        }

        .toast-message {
            flex: 1;
            font-size: 0.875rem;
            color: var(--text-primary);
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .main-content {
                padding: var(--space-lg);
            }

            .header-content {
                padding: 0 var(--space-lg);
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-md);
            }

            .header-actions {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }

            .controls-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                flex-direction: column;
                align-items: stretch;
            }

            .select, .input-search {
                width: 100%;
                min-width: unset;
            }

            .table-wrapper {
                overflow-x: scroll;
            }

            .sankey-svg-wrapper {
                height: 300px;
            }
        }

        /* Utility Classes */
        .hidden {
            display: none;
        }

        .text-center {
            text-align: center;
        }

        .mt-lg {
            margin-top: var(--space-lg);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Supabase Configuration
        const SUPABASE_URL = 'https://jnmrwxdevwjahamdtvqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpubXJ3eGRldndqYWhhbWR0dnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzA4NTMzNTMsImV4cCI6MjA0NjQyOTM1M30.0OrwUijR2fQs6FQ2vBsXiImCIE4dJ3CwVdWLqPLsJ2c';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Toast Notification Component
        function Toast({ message, type, onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 5000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div className={`toast ${type}`}>
                    <div className="toast-icon">
                        {type === 'success' ? '✓' : '✕'}
                    </div>
                    <div className="toast-message">{message}</div>
                </div>
            );
        }

        // Toast Container Component
        function ToastContainer({ toasts, removeToast }) {
            return (
                <div className="toast-container">
                    {toasts.map(toast => (
                        <Toast
                            key={toast.id}
                            message={toast.message}
                            type={toast.type}
                            onClose={() => removeToast(toast.id)}
                        />
                    ))}
                </div>
            );
        }

        // Authentication Component
        function AuthPage({ onAuthenticated }) {
            const [loading, setLoading] = useState(false);

            const handleGoogleLogin = async () => {
                setLoading(true);
                try {
                    const { error } = await supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: {
                            redirectTo: window.location.origin
                        }
                    });
                    if (error) throw error;
                } catch (error) {
                    console.error('Auth error:', error);
                    alert('Authentication failed. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="auth-container">
                    <div className="auth-card">
                        <div className="auth-logo">BidFlow</div>
                        <div className="auth-subtitle">Amazon Placement Optimizer</div>
                        <button
                            className="btn-auth"
                            onClick={handleGoogleLogin}
                            disabled={loading}
                        >
                            {loading ? 'Signing in...' : 'Sign in with Google'}
                        </button>
                    </div>
                </div>
            );
        }

        // Animated Sankey Diagram Component
        function SankeyDiagram({ data }) {
            const svgRef = useRef();
            const animationRef = useRef();
            const particlesRef = useRef([]);

            useEffect(() => {
                if (!data || !svgRef.current) return;

                const svg = d3.select(svgRef.current);
                const width = svgRef.current.clientWidth;
                const height = svgRef.current.clientHeight;

                svg.selectAll('*').remove();

                // Create Sankey generator
                const sankey = d3.sankey()
                    .nodeWidth(20)
                    .nodePadding(40)
                    .extent([[50, 50], [width - 50, height - 50]]);

                // Process data
                const graph = sankey({
                    nodes: data.nodes.map(d => ({ ...d })),
                    links: data.links.map(d => ({ ...d }))
                });

                // Color scale
                const colorMap = {
                    'Top of Search': '#00D9FF',
                    'Rest of Search': '#B794F6',
                    'Product Page': '#10B981'
                };

                // Draw links
                const links = svg.append('g')
                    .selectAll('path')
                    .data(graph.links)
                    .join('path')
                    .attr('class', 'sankey-link')
                    .attr('d', d3.sankeyLinkHorizontal())
                    .attr('stroke', d => colorMap[d.target.name] || '#64748B')
                    .attr('stroke-width', d => Math.max(1, d.width));

                // Draw nodes
                const nodes = svg.append('g')
                    .selectAll('g')
                    .data(graph.nodes)
                    .join('g')
                    .attr('class', 'sankey-node');

                nodes.append('rect')
                    .attr('x', d => d.x0)
                    .attr('y', d => d.y0)
                    .attr('height', d => d.y1 - d.y0)
                    .attr('width', d => d.x1 - d.x0)
                    .attr('fill', d => colorMap[d.name] || '#64748B')
                    .attr('rx', 4);

                nodes.append('text')
                    .attr('x', d => d.x0 < width / 2 ? d.x1 + 10 : d.x0 - 10)
                    .attr('y', d => (d.y1 + d.y0) / 2)
                    .attr('dy', '0.35em')
                    .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
                    .text(d => d.name);

                // Animated particles
                const particleGroup = svg.append('g');

                function createParticles() {
                    particlesRef.current = [];
                    graph.links.forEach(link => {
                        const particleCount = Math.max(5, Math.floor(link.value / 1000));
                        for (let i = 0; i < particleCount; i++) {
                            particlesRef.current.push({
                                link,
                                progress: Math.random(),
                                speed: 0.002 + Math.random() * 0.003
                            });
                        }
                    });
                }

                createParticles();

                function animate() {
                    particlesRef.current.forEach(particle => {
                        particle.progress += particle.speed;
                        if (particle.progress > 1) particle.progress = 0;
                    });

                    const particles = particleGroup
                        .selectAll('circle')
                        .data(particlesRef.current);

                    particles.enter()
                        .append('circle')
                        .attr('class', 'sankey-particle')
                        .attr('r', 2)
                        .merge(particles)
                        .attr('cx', d => {
                            const path = d3.sankeyLinkHorizontal()(d.link);
                            const point = d3.path();
                            point.moveTo(d.link.source.x1, d.link.y0);
                            point.bezierCurveTo(
                                (d.link.source.x1 + d.link.target.x0) / 2, d.link.y0,
                                (d.link.source.x1 + d.link.target.x0) / 2, d.link.y1,
                                d.link.target.x0, d.link.y1
                            );
                            const length = (d.link.target.x0 - d.link.source.x1);
                            return d.link.source.x1 + length * d.progress;
                        })
                        .attr('cy', d => {
                            const y0 = d.link.y0;
                            const y1 = d.link.y1;
                            return y0 + (y1 - y0) * d.progress;
                        });

                    particles.exit().remove();

                    animationRef.current = requestAnimationFrame(animate);
                }

                animate();

                return () => {
                    if (animationRef.current) {
                        cancelAnimationFrame(animationRef.current);
                    }
                };
            }, [data]);

            return (
                <div className="sankey-svg-wrapper">
                    <svg ref={svgRef}></svg>
                </div>
            );
        }

        // Main Dashboard Component
        function Dashboard({ session, onLogout }) {
            const [loading, setLoading] = useState(true);
            const [availableWeeks, setAvailableWeeks] = useState([]);
            const [selectedWeek, setSelectedWeek] = useState(null);
            const [reports, setReports] = useState([]);
            const [filteredData, setFilteredData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [portfolioFilter, setPortfolioFilter] = useState('all');
            const [sortConfig, setSortConfig] = useState({ key: 'Campaign', direction: 'asc' });
            const [editedCells, setEditedCells] = useState({});
            const [sankeyExpanded, setSankeyExpanded] = useState(true);
            const [toasts, setToasts] = useState([]);
            const [submitting, setSubmitting] = useState(false);

            const tenantName = session?.user?.email?.split('@')[0] || 'User';

            // Toast management
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };

            const removeToast = (id) => {
                setToasts(prev => prev.filter(t => t.id !== id));
            };

            // Fetch available weeks
            useEffect(() => {
                fetchAvailableWeeks();
            }, []);

            const fetchAvailableWeeks = async () => {
                try {
                    setLoading(true);
                    const { data: snapshots, error } = await supabase
                        .from('weekly_snapshots')
                        .select('*')
                        .eq('tenant_id', session.user.id)
                        .order('year', { ascending: false })
                        .order('week_number', { ascending: false });

                    if (error) throw error;

                    if (snapshots && snapshots.length > 0) {
                        setAvailableWeeks(snapshots);
                        setSelectedWeek(snapshots[0]);
                        await fetchWeekData(snapshots[0].id);
                    } else {
                        setLoading(false);
                    }
                } catch (error) {
                    console.error('Error fetching weeks:', error);
                    addToast('Failed to load available weeks', 'error');
                    setLoading(false);
                }
            };

            // Fetch week data
            const fetchWeekData = async (snapshotId) => {
                try {
                    setLoading(true);

                    const [perfResult, bidsResult, portfoliosResult] = await Promise.all([
                        supabase.from('weekly_placement_performance').select('*').eq('snapshot_id', snapshotId),
                        supabase.from('weekly_placement_bids').select('*').eq('snapshot_id', snapshotId),
                        supabase.from('weekly_portfolios').select('*').eq('snapshot_id', snapshotId)
                    ]);

                    if (perfResult.error) throw perfResult.error;
                    if (bidsResult.error) throw bidsResult.error;
                    if (portfoliosResult.error) throw portfoliosResult.error;

                    const performance = perfResult.data || [];
                    const bids = bidsResult.data || [];
                    const portfolios = portfoliosResult.data || [];

                    // Create lookup maps
                    const bidMap = {};
                    bids.forEach(bid => {
                        bidMap[bid.campaign_id?.trim()] = bid;
                    });

                    const portfolioMap = {};
                    portfolios.forEach(p => {
                        portfolioMap[p.portfolio_id] = p.portfolio_name;
                    });

                    // Map placement types
                    const placementTypeMap = {
                        'Top of Search': 'Placement Top',
                        'Product Page': 'Placement Product Page',
                        'Rest of Search': 'Placement Rest Of Search'
                    };

                    const bidColumnMap = {
                        'Top of Search': 'placement_top_of_search',
                        'Product Page': 'placement_product_page',
                        'Rest of Search': 'placement_rest_of_search'
                    };

                    // Parse data
                    const parsedData = performance.map(p => {
                        const campaignId = (p.campaign_id || '').trim();
                        const campaignBids = bidMap[campaignId] || {};
                        const bidColumn = bidColumnMap[p.placement_type];
                        const multiplier = campaignBids[bidColumn] || 0;
                        const portfolioName = campaignBids.portfolio_id ?
                            (portfolioMap[campaignBids.portfolio_id] || campaignBids.portfolio_id) : '-';

                        return {
                            campaign_id: campaignId,
                            campaign_name: p.campaign_name,
                            portfolio_name: portfolioName,
                            budget: campaignBids.campaign_budget ? `$${campaignBids.campaign_budget}` : '-',
                            placement_type: p.placement_type,
                            clicks_30d: p.clicks_30d || 0,
                            spend_30d: p.spend_30d || 0,
                            orders_30d: p.purchases_30d || 0,
                            cvr_30d: p.cvr_30d || 0,
                            acos_30d: p.acos_30d || 0,
                            clicks_7d: p.clicks_7d || 0,
                            spend_7d: p.spend_7d || 0,
                            orders_7d: p.purchases_7d || 0,
                            cvr_7d: p.cvr_7d || 0,
                            acos_7d: p.acos_7d || 0,
                            multiplier: multiplier,
                            snapshot_id: snapshotId
                        };
                    });

                    setReports(parsedData);
                    setFilteredData(parsedData);
                } catch (error) {
                    console.error('Error fetching week data:', error);
                    addToast('Failed to load week data', 'error');
                } finally {
                    setLoading(false);
                }
            };

            // Handle week change
            const handleWeekChange = async (e) => {
                const weekId = e.target.value;
                const week = availableWeeks.find(w => w.id === weekId);
                setSelectedWeek(week);
                await fetchWeekData(weekId);
            };

            // Filter and sort data
            useEffect(() => {
                let filtered = [...reports];

                // Search filter
                if (searchTerm) {
                    filtered = filtered.filter(row =>
                        row.campaign_name?.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }

                // Portfolio filter
                if (portfolioFilter !== 'all') {
                    filtered = filtered.filter(row => row.portfolio_name === portfolioFilter);
                }

                // Group by campaign
                const groups = {};
                filtered.forEach(row => {
                    if (!groups[row.campaign_name]) {
                        groups[row.campaign_name] = [];
                    }
                    groups[row.campaign_name].push(row);
                });

                // Sort within groups
                const placementOrder = {
                    'Top of Search': 1,
                    'Rest of Search': 2,
                    'Product Page': 3
                };

                Object.values(groups).forEach(groupRows => {
                    groupRows.sort((a, b) => {
                        const orderA = placementOrder[a.placement_type] || 999;
                        const orderB = placementOrder[b.placement_type] || 999;
                        return orderA - orderB;
                    });
                });

                // Sort groups
                const sortedGroupKeys = Object.keys(groups).sort((keyA, keyB) => {
                    const groupA = groups[keyA];
                    const groupB = groups[keyB];

                    if (sortConfig.key === 'campaign_name') {
                        return sortConfig.direction === 'asc'
                            ? keyA.localeCompare(keyB)
                            : keyB.localeCompare(keyA);
                    }

                    const getSum = (group) => group.reduce((sum, row) => {
                        const val = row[sortConfig.key] || 0;
                        return sum + (parseFloat(val) || 0);
                    }, 0);

                    const sumA = getSum(groupA);
                    const sumB = getSum(groupB);

                    return sortConfig.direction === 'asc'
                        ? sumA - sumB
                        : sumB - sumA;
                });

                // Flatten
                const finalData = sortedGroupKeys.flatMap(key => groups[key]);
                setFilteredData(finalData);
            }, [reports, searchTerm, portfolioFilter, sortConfig]);

            // Handle sort
            const handleSort = (key) => {
                setSortConfig(prev => ({
                    key,
                    direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc'
                }));
            };

            // Handle cell edit
            const handleCellEdit = (campaignId, placementType, value) => {
                const key = `${campaignId}-${placementType}`;
                setEditedCells(prev => ({
                    ...prev,
                    [key]: parseFloat(value) || 0
                }));
            };

            // Submit changes
            const handleSubmit = async () => {
                if (Object.keys(editedCells).length === 0) {
                    addToast('No changes to submit', 'error');
                    return;
                }

                setSubmitting(true);
                try {
                    // In a real implementation, you would update the database here
                    // For now, just show success
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    addToast('Changes saved successfully!', 'success');
                    setEditedCells({});
                } catch (error) {
                    console.error('Error submitting changes:', error);
                    addToast('Failed to save changes', 'error');
                } finally {
                    setSubmitting(false);
                }
            };

            // Unique portfolios
            const portfolios = useMemo(() => {
                const unique = [...new Set(reports.map(r => r.portfolio_name))];
                return unique.filter(p => p && p !== '-').sort();
            }, [reports]);

            // Sankey data
            const sankeyData = useMemo(() => {
                const nodes = [
                    { name: 'Ad Spend' },
                    { name: 'Top of Search' },
                    { name: 'Rest of Search' },
                    { name: 'Product Page' }
                ];

                const links = [
                    { source: 0, target: 1, value: reports.filter(r => r.placement_type === 'Top of Search').reduce((sum, r) => sum + r.spend_30d, 0) },
                    { source: 0, target: 2, value: reports.filter(r => r.placement_type === 'Rest of Search').reduce((sum, r) => sum + r.spend_30d, 0) },
                    { source: 0, target: 3, value: reports.filter(r => r.placement_type === 'Product Page').reduce((sum, r) => sum + r.spend_30d, 0) }
                ];

                return { nodes, links };
            }, [reports]);

            // Placement badge
            const PlacementBadge = ({ type }) => {
                const badgeClass = type === 'Top of Search' ? 'top' :
                                   type === 'Rest of Search' ? 'ros' : 'pp';
                const badgeText = type === 'Top of Search' ? 'TOP' :
                                 type === 'Rest of Search' ? 'ROS' : 'PP';
                return <span className={`placement-badge ${badgeClass}`}>{badgeText}</span>;
            };

            return (
                <div className="dashboard">
                    <header className="header">
                        <div className="header-content">
                            <div className="header-brand">BidFlow</div>
                            <div className="header-actions">
                                <div className="tenant-badge">
                                    <span className="status-dot"></span>
                                    <span>{tenantName}</span>
                                </div>
                                <button className="btn-logout" onClick={onLogout}>
                                    Logout
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="main-content">
                        {/* Controls */}
                        <div className="controls-bar">
                            <div className="control-group">
                                <label className="control-label">Week:</label>
                                <select
                                    className="select"
                                    value={selectedWeek?.id || ''}
                                    onChange={handleWeekChange}
                                >
                                    {availableWeeks.map(week => (
                                        <option key={week.id} value={week.id}>
                                            {week.week_id}
                                        </option>
                                    ))}
                                </select>
                            </div>

                            <div className="control-group">
                                <label className="control-label">Portfolio:</label>
                                <select
                                    className="select"
                                    value={portfolioFilter}
                                    onChange={(e) => setPortfolioFilter(e.target.value)}
                                >
                                    <option value="all">All Portfolios</option>
                                    {portfolios.map(p => (
                                        <option key={p} value={p}>{p}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="control-group" style={{ flex: 1 }}>
                                <input
                                    type="text"
                                    className="input-search"
                                    placeholder="Search campaigns..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>

                        {/* Sankey Diagram */}
                        <div className="sankey-section">
                            <div
                                className="sankey-header"
                                onClick={() => setSankeyExpanded(!sankeyExpanded)}
                            >
                                <h2 className="sankey-title">Placement Distribution</h2>
                                <span className={`toggle-icon ${sankeyExpanded ? 'expanded' : ''}`}>
                                    ▼
                                </span>
                            </div>
                            <div className={`sankey-content ${!sankeyExpanded ? 'collapsed' : ''}`}>
                                {!loading && <SankeyDiagram data={sankeyData} />}
                            </div>
                        </div>

                        {/* Data Table */}
                        <div className="table-section">
                            <div className="table-header">
                                <h2 className="table-title">Campaign Performance</h2>
                                <button
                                    className="btn-submit"
                                    onClick={handleSubmit}
                                    disabled={submitting || Object.keys(editedCells).length === 0}
                                >
                                    {submitting ? 'Saving...' : `Save Changes ${Object.keys(editedCells).length > 0 ? `(${Object.keys(editedCells).length})` : ''}`}
                                </button>
                            </div>

                            <div className="table-wrapper">
                                {loading ? (
                                    <div className="loading-container">
                                        <div className="spinner"></div>
                                        <div className="loading-text">Loading data...</div>
                                    </div>
                                ) : (
                                    <table className="data-table">
                                        <thead>
                                            <tr>
                                                <th className="sortable" onClick={() => handleSort('campaign_name')}>
                                                    Campaign
                                                </th>
                                                <th>Portfolio</th>
                                                <th>Budget</th>
                                                <th>Placement</th>
                                                <th className="sortable" onClick={() => handleSort('clicks_30d')}>
                                                    Clicks 30d
                                                </th>
                                                <th className="sortable" onClick={() => handleSort('spend_30d')}>
                                                    Spend 30d
                                                </th>
                                                <th className="sortable" onClick={() => handleSort('orders_30d')}>
                                                    Orders 30d
                                                </th>
                                                <th className="sortable" onClick={() => handleSort('cvr_30d')}>
                                                    CVR 30d
                                                </th>
                                                <th className="sortable" onClick={() => handleSort('acos_30d')}>
                                                    ACoS 30d
                                                </th>
                                                <th className="sortable" onClick={() => handleSort('clicks_7d')}>
                                                    Clicks 7d
                                                </th>
                                                <th className="sortable" onClick={() => handleSort('spend_7d')}>
                                                    Spend 7d
                                                </th>
                                                <th className="sortable" onClick={() => handleSort('orders_7d')}>
                                                    Orders 7d
                                                </th>
                                                <th className="sortable" onClick={() => handleSort('cvr_7d')}>
                                                    CVR 7d
                                                </th>
                                                <th className="sortable" onClick={() => handleSort('acos_7d')}>
                                                    ACoS 7d
                                                </th>
                                                <th>Multiplier %</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredData.map((row, idx) => {
                                                const isFirstInGroup = idx === 0 ||
                                                    filteredData[idx - 1].campaign_name !== row.campaign_name;
                                                const editKey = `${row.campaign_id}-${row.placement_type}`;
                                                const currentValue = editedCells[editKey] !== undefined ?
                                                    editedCells[editKey] : row.multiplier;

                                                return (
                                                    <tr
                                                        key={`${row.campaign_id}-${row.placement_type}`}
                                                        className={isFirstInGroup ? 'campaign-group-start' : ''}
                                                    >
                                                        <td className="campaign-name">
                                                            {isFirstInGroup ? row.campaign_name : ''}
                                                        </td>
                                                        <td>{isFirstInGroup ? row.portfolio_name : ''}</td>
                                                        <td>{isFirstInGroup ? row.budget : ''}</td>
                                                        <td>
                                                            <PlacementBadge type={row.placement_type} />
                                                        </td>
                                                        <td className="numeric">{row.clicks_30d.toLocaleString()}</td>
                                                        <td className="numeric">${row.spend_30d.toFixed(2)}</td>
                                                        <td className="numeric">{row.orders_30d}</td>
                                                        <td className="numeric">{row.cvr_30d.toFixed(2)}%</td>
                                                        <td className="numeric">{row.acos_30d.toFixed(2)}%</td>
                                                        <td className="numeric">{row.clicks_7d.toLocaleString()}</td>
                                                        <td className="numeric">${row.spend_7d.toFixed(2)}</td>
                                                        <td className="numeric">{row.orders_7d}</td>
                                                        <td className="numeric">{row.cvr_7d.toFixed(2)}%</td>
                                                        <td className="numeric">{row.acos_7d.toFixed(2)}%</td>
                                                        <td className="editable-cell">
                                                            <input
                                                                type="number"
                                                                className={`editable-input ${editedCells[editKey] !== undefined ? 'changed' : ''}`}
                                                                value={currentValue}
                                                                onChange={(e) => handleCellEdit(row.campaign_id, row.placement_type, e.target.value)}
                                                                min="0"
                                                                max="900"
                                                            />
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    </main>

                    <ToastContainer toasts={toasts} removeToast={removeToast} />
                </div>
            );
        }

        // Main App Component
        function App() {
            const [session, setSession] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // Check active session
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    setLoading(false);
                });

                // Listen for auth changes
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                });

                return () => subscription.unsubscribe();
            }, []);

            const handleLogout = async () => {
                await supabase.auth.signOut();
            };

            if (loading) {
                return (
                    <div className="loading-container" style={{ minHeight: '100vh' }}>
                        <div className="spinner"></div>
                        <div className="loading-text">Loading BidFlow...</div>
                    </div>
                );
            }

            return session ? (
                <Dashboard session={session} onLogout={handleLogout} />
            ) : (
                <AuthPage />
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
